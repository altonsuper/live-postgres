<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>📤 Upload - MCALTONZ 2026</title>
  <style>
    :root{--bg:#040508;--accent:#00ced1;--glass:rgba(255,255,255,0.04);--border:rgba(0,206,209,0.15);--text:#e8f0ff;--sec:#8a9ab0}
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:var(--bg);color:var(--text);font-family:system-ui,sans-serif;min-height:100vh;padding:2rem}
    .container{max-width:600px;margin:0 auto}
    h1{text-align:center;color:var(--accent);margin-bottom:2rem}
    .drop{border:2px dashed var(--border);border-radius:18px;padding:3rem 2rem;text-align:center;background:var(--glass);cursor:pointer}
    .drop:hover{border-color:var(--accent)}
    input[type="file"]{display:none}
    .preview{margin-top:1.5rem;padding:1rem;background:var(--glass);border-radius:12px;display:none}
    .preview.show{display:block}
    .preview img,.preview video,.preview audio{max-width:100%;margin-bottom:0.5rem}
    .btn{width:100%;padding:0.8rem;margin-top:1rem;background:var(--accent);color:#000;border:none;border-radius:8px;font-weight:600;cursor:pointer}
    .btn:disabled{opacity:0.6}
    .toast{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%);padding:0.8rem 1.5rem;background:var(--glass);border:1px solid var(--border);border-radius:8px;display:none;z-index:999}
    .toast.show{display:block}
  </style>
</head>
<body>
  <div class="container">
    <h1>📤 Upload Media</h1>
    <div class="drop" id="dropZone">
      <p>📁 Tap to select or drop file</p>
      <input type="file" id="fileInput" accept="image/*,video/*,audio/*,.pdf,.html" />
    </div>
    <div class="preview" id="preview">
      <div id="media"></div>
      <p id="info" style="color:var(--sec);font-size:0.9rem"></p>
      <button class="btn" id="uploadBtn">✅ Upload to Cloud</button>
    </div>
  </div>
  <div class="toast" id="toast"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = "https://zmtudgbebtnoiysebeli.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_U22LM59-HGzGBp0xk8Ouxg_CGngfga8";
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    
    const dropZone = document.getElementById('dropZone');
    const fileInput = document.getElementById('fileInput');
    const preview = document.getElementById('preview');
    const media = document.getElementById('media');
    const info = document.getElementById('info');
    const uploadBtn = document.getElementById('uploadBtn');
    const toast = document.getElementById('toast');
    let selectedFile = null, session = null;

    // ✅ KEY FIX: Wait for session on load
    (async function boot() {
      if (sessionStorage.getItem("post_login_redirect")) {
        sessionStorage.removeItem("post_login_redirect");
        for (let i = 0; i < 10; i++) {
          const {  } = await supabase.auth.getSession();
          if (sessionData?.session) { session = sessionData.session; break; }
          await new Promise(r => setTimeout(r, 100));
        }
      } else {
        const {  } = await supabase.auth.getSession();
        session = sessionData?.session;
      }
      if (!session) { window.location.replace("index.html"); return; }
      console.log("✅ Authenticated:", session.user.email);
    })();

    dropZone.onclick = () => fileInput.click();
    fileInput.onchange = (e) => {
      const f = e.target.files[0]; if (!f) return;
      selectedFile = f;
      const url = URL.createObjectURL(f);
      if (f.type.startsWith('image/')) media.innerHTML = `<img src="${url}">`;
      else if (f.type.startsWith('video/')) media.innerHTML = `<video src="${url}" controls></video>`;
      else if (f.type.startsWith('audio/')) media.innerHTML = `<audio src="${url}" controls>`;
      else media.innerHTML = `<div style="height:180px;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0.2);border-radius:8px">📄 ${f.name.split('.').pop().toUpperCase()}</div>`;
      info.textContent = `${f.name} • ${(f.size/1024).toFixed(1)} KB`;
      preview.classList.add('show');
    };

    uploadBtn.onclick = async () => {
      if (!selectedFile || !session) return;
      uploadBtn.disabled = true; uploadBtn.textContent = '⏳ Uploading...';
      
      try {
        const safeEmail = session.user.email.replace(/[^a-zA-Z0-9]/g, '_');
        const ext = selectedFile.name.split('.').pop();
        const path = `${safeEmail}/${Date.now()}.${ext}`;
        
        const { error: upErr } = await supabase.storage.from('user-uploads').upload(path, selectedFile);
        if (upErr) throw upErr;
        
        const {  } = await supabase.storage.from('user-uploads').createSignedUrl(path, 60*60*24*7);
        if (!signed?.signedUrl) throw new Error('No URL');
        
        await supabase.from('uploads').insert({
          user_email: session.user.email,
          user_id: session.user.id,
          file_name: selectedFile.name,
          file_path: signed.signedUrl,
          file_type: selectedFile.type || 'application/octet-stream',
          file_size: selectedFile.size
        });
        
        toast.textContent = '✅ Upload successful!'; toast.classList.add('show');
        setTimeout(() => window.location.href = 'gallery.html', 1000);
      } catch (err) {
        toast.textContent = '❌ ' + err.message; toast.classList.add('show');
        uploadBtn.disabled = false; uploadBtn.textContent = '✅ Upload to Cloud';
      }
    };
  </script>
</body>
</html>
