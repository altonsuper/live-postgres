<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>📤 Upload - MCALTONZ 2026</title>
  <style>
    :root { --bg:#040508; --accent:#00ced1; --glass:rgba(255,255,255,0.04); --border:rgba(0,206,209,0.15); --text:#e8f0ff; --sec:#8a9ab0; }
    * { box-sizing:border-box; margin:0; padding:0; }
    body { background:var(--bg); color:var(--text); font-family:system-ui,sans-serif; min-height:100vh; padding:2rem; }
    .container { max-width:700px; margin:0 auto; }
    h1 { text-align:center; color:var(--accent); margin-bottom:2rem; }
    .drop { border:2px dashed var(--border); border-radius:18px; padding:3rem 2rem; text-align:center; background:var(--glass); cursor:pointer; transition:all 0.3s; }
    .drop:hover, .drop.dragover { border-color:var(--accent); background:rgba(0,206,209,0.05); }
    input[type="file"] { display:none; }
    .preview { margin-top:2rem; padding:1.5rem; background:var(--glass); border-radius:12px; display:none; border:1px solid var(--border); }
    .preview.show { display:block; animation:slideIn 0.3s ease; }
    @keyframes slideIn { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
    .media-container { background:rgba(0,0,0,0.2); border-radius:8px; padding:1rem; margin-bottom:1rem; min-height:200px; display:flex; align-items:center; justify-content:center; }
    .media-container img, .media-container video { max-width:100%; max-height:300px; border-radius:8px; }
    .media-container audio { width:100%; }
    .file-info { color:var(--sec); font-size:0.9rem; margin:0.5rem 0; text-align:center; }
    .btn { width:100%; padding:1rem; margin-top:1rem; background:var(--accent); color:#000; border:none; border-radius:8px; font-weight:600; cursor:pointer; font-size:1rem; }
    .btn:disabled { opacity:0.6; cursor:not-allowed; }
    .btn-cancel { background:transparent; border:1px solid var(--border); color:var(--text); margin-top:0.5rem; }
    .progress { margin-top:1rem; display:none; }
    .progress.show { display:block; }
    .progress-bar { height:8px; background:rgba(0,0,0,0.3); border-radius:4px; overflow:hidden; }
    .progress-fill { height:100%; background:var(--accent); width:0%; transition:width 0.3s; }
    .progress-text { text-align:center; color:var(--sec); font-size:0.9rem; margin-top:0.5rem; }
    .toast { position:fixed; bottom:2rem; left:50%; transform:translateX(-50%); padding:0.8rem 1.5rem; background:var(--glass); border:1px solid var(--border); border-radius:8px; display:none; z-index:999; }
    .toast.show { display:block; animation:slideUp 0.3s; }
    @keyframes slideUp { from { transform:translateX(-50%) translateY(20px); } to { transform:translateX(-50%) translateY(0); } }
    .debug { margin-top:1rem; padding:0.5rem; background:rgba(0,0,0,0.3); border-radius:4px; font-size:0.75rem; font-family:monospace; color:#888; }
  </style>
</head>
<body>
  <div class="container">
    <h1>📤 Upload Media</h1>
    
    <div class="drop" id="dropZone">
      <p style="font-size:1.2rem; margin-bottom:0.5rem;">📁</p>
      <p>Drop files here or click to browse</p>
      <p style="color:var(--sec); font-size:0.9rem; margin-top:0.5rem">Supports: JPG, PNG, MP4, WEBM, MP3, PDF, HTML</p>
      <input type="file" id="fileInput" accept="image/*,video/*,audio/*,.pdf,.html,.txt" />
    </div>

    <div class="preview" id="preview">
      <h3 style="margin-bottom:1rem;">🔍 Preview</h3>
      <div class="media-container" id="mediaContainer"></div>
      <p class="file-info" id="fileInfo"></p>
      
      <button class="btn" id="uploadBtn">✅ Upload to Cloud</button>
      <button class="btn btn-cancel" id="cancelBtn">❌ Cancel</button>
      
      <div class="progress" id="progress">
        <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
        <p class="progress-text" id="progressText">Preparing...</p>
      </div>
    </div>
    
    <div class="debug" id="debug"></div>
  </div>
  
  <div class="toast" id="toast"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = "https://zmtudgbebtnoiysebeli.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_U22LM59-HGzGBp0xk8Ouxg_CGngfga8";
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    
    const dropZone = document.getElementById('dropZone');
    const fileInput = document.getElementById('fileInput');
    const preview = document.getElementById('preview');
    const mediaContainer = document.getElementById('mediaContainer');
    const fileInfo = document.getElementById('fileInfo');
    const uploadBtn = document.getElementById('uploadBtn');
    const cancelBtn = document.getElementById('cancelBtn');
    const progress = document.getElementById('progress');
    const progressFill = document.getElementById('progressFill');
    const progressText = document.getElementById('progressText');
    const toast = document.getElementById('toast');
    const debug = document.getElementById('debug');
    
    let selectedFile = null;
    let session = null;

    function log(msg) {
      console.log('[Upload]', msg);
      debug.textContent = msg;
    }

    // Auth guard
    async function checkAuth() {
      log("Checking auth...");
      const { data } = await supabase.auth.getSession();
      if (!data?.session) {
        log("Not authenticated, redirecting to index.html");
        window.location.href = "index.html";
        return false;
      }
      session = data.session;
      log("Authenticated: " + session.user.email);
      return true;
    }

    // Drop zone events
    dropZone.addEventListener('click', () => {
      log("Drop zone clicked, triggering file input");
      fileInput.click();
    });

    dropZone.addEventListener('dragover', (e) => {
      e.preventDefault();
      dropZone.classList.add('dragover');
    });

    dropZone.addEventListener('dragleave', () => {
      dropZone.classList.remove('dragover');
    });

    dropZone.addEventListener('drop', (e) => {
      e.preventDefault();
      dropZone.classList.remove('dragover');
      const files = e.dataTransfer.files;
      if (files.length > 0) {
        log("File dropped: " + files[0].name);
        handleFile(files[0]);
      }
    });

    fileInput.addEventListener('change', (e) => {
      if (e.target.files.length > 0) {
        log("File selected: " + e.target.files[0].name);
        handleFile(e.target.files[0]);
      }
    });

    function handleFile(file) {
      selectedFile = file;
      const url = URL.createObjectURL(file);
      
      // Preview based on file type
      if (file.type.startsWith('image/')) {
        mediaContainer.innerHTML = `<img src="${url}" alt="${file.name}">`;
      } else if (file.type.startsWith('video/')) {
        mediaContainer.innerHTML = `<video src="${url}" controls></video>`;
      } else if (file.type.startsWith('audio/')) {
        mediaContainer.innerHTML = `<audio src="${url}" controls></audio>`;
      } else {
        const ext = file.name.split('.').pop().toUpperCase();
        mediaContainer.innerHTML = `<div style="font-size:3rem;">📄</div><p style="margin-top:0.5rem">${ext}</p>`;
      }
      
      fileInfo.textContent = `${file.name} • ${(file.size / 1024).toFixed(1)} KB • ${file.type || 'unknown'}`;
      preview.classList.add('show');
      log("Preview shown");
    }

    cancelBtn.addEventListener('click', () => {
      log("Upload cancelled");
      preview.classList.remove('show');
      selectedFile = null;
      fileInput.value = '';
      progress.classList.remove('show');
    });

    uploadBtn.addEventListener('click', async () => {
      if (!selectedFile) {
        showToast('❌ No file selected', 'error');
        return;
      }
      
      log("Starting upload: " + selectedFile.name);
      uploadBtn.disabled = true;
      uploadBtn.textContent = '⏳ Uploading...';
      progress.classList.add('show');
      
      try {
        // Create safe folder name from email
        const safeEmail = session.user.email.replace(/[^a-zA-Z0-9]/g, '_');
        const ext = selectedFile.name.split('.').pop();
        const timestamp = Date.now();
        const randomStr = Math.random().toString(36).substring(7);
        const filePath = `${safeEmail}/${timestamp}_${randomStr}.${ext}`;
        
        log("Uploading to: " + filePath);
        progressText.textContent = "Uploading to storage...";
        progressFill.style.width = '30%';
        
        // Upload to Storage
        const { data: uploadData, error: uploadError } = await supabase.storage
          .from('user-uploads')
          .upload(filePath, selectedFile, {
            contentType: selectedFile.type || 'application/octet-stream',
            upsert: false
          });
        
        if (uploadError) throw uploadError;
        log("Storage upload success");
        
        progressText.textContent = "Getting download URL...";
        progressFill.style.width = '60%';
        
        // Get signed URL (valid for 7 days)
        const { data: signedData, error: signedError } = await supabase.storage
          .from('user-uploads')
          .createSignedUrl(filePath, 60 * 60 * 24 * 7);
        
        if (signedError) throw signedError;
        if (!signedData?.signedUrl) throw new Error('No signed URL returned');
        
        log("Signed URL obtained");
        progressText.textContent = "Saving to database...";
        progressFill.style.width = '80%';
        
        // Save metadata to database
        const { error: dbError } = await supabase.from('uploads').insert({
          user_email: session.user.email,
          user_id: session.user.id,
          file_name: selectedFile.name,
          file_path: signedData.signedUrl,
          file_type: selectedFile.type || 'application/octet-stream',
          file_size: selectedFile.size
        });
        
        if (dbError) throw dbError;
        log("Database insert success");
        
        progressFill.style.width = '100%';
        progressText.textContent = "Complete!";
        
        showToast('✅ Upload successful!', 'success');
        setTimeout(() => {
          log("Redirecting to gallery.html");
          window.location.href = 'gallery.html';
        }, 1000);
        
      } catch (err) {
        log("Upload error: " + err.message);
        console.error(err);
        showToast('❌ ' + err.message, 'error');
        progress.classList.remove('show');
        uploadBtn.disabled = false;
        uploadBtn.textContent = '✅ Upload to Cloud';
      }
    });

    function showToast(msg, type = 'success') {
      toast.textContent = msg;
      toast.style.borderColor = type === 'error' ? '#ff6b9d' : 'var(--border)';
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 4000);
    }

    // Init
    log("Page loaded");
    checkAuth();
  </script>
</body>
</html>
