<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>📤 MCALTONZ 2026 // Upload Studio</title>
  <style>
    /* 🌍 GLOBAL DESIGN SYSTEM (Sync with gallery.html) */
    :root {
      --bg-deep: #040508; --bg-mid: #080a12;
      --accent-primary: #00ced1; --accent-light: #20b2aa; --accent-dark: #008080;
      --accent-glow: rgba(0, 206, 209, 0.25);
      --glass-bg: rgba(255,255,255,0.04); --glass-border: rgba(0, 206, 209, 0.15);
      --text-primary: #e8f0ff; --text-secondary: #8a9ab0;
      --radius-lg: 18px; --radius-md: 10px; --radius-sm: 6px;
      --font-main: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      --font-mono: "SF Mono", "Fira Code", monospace;
      --transition-smooth: 0.3s cubic-bezier(0.25, 1, 0.5, 1);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html { scroll-behavior: smooth; }
    body {
      background: var(--bg-deep); color: var(--text-primary);
      font-family: var(--font-main); overflow-x: hidden; min-height: 100vh;
      padding-top: 68px; position: relative;
    }

    /* 🌐 DEPTH BG */
    .depth-bg {
      position: fixed; inset: 0; z-index: -1;
      background: radial-gradient(circle at 25% 15%, rgba(0,206,209,0.1) 0%, transparent 40%),
                  radial-gradient(circle at 75% 85%, rgba(32,178,170,0.08) 0%, transparent 40%),
                  var(--bg-deep);
    }

    /* 🖥️ NAV */
    .nav {
      position: fixed; top: 0; left: 0; right: 0;
      display: flex; justify-content: space-between; align-items: center;
      padding: 0.9rem 2rem; background: rgba(8,10,18,0.85);
      backdrop-filter: blur(12px); border-bottom: 1px solid var(--glass-border);
      z-index: 100;
    }
    .logo {
      font-size: 1.25rem; font-weight: 800; letter-spacing: 2px;
      background: linear-gradient(90deg, var(--accent-primary), var(--accent-light));
      -webkit-background-clip: text; background-clip: text; color: transparent;
    }
    .nav-links { display: flex; gap: 0.5rem; flex-wrap: wrap; }
    .nav-link {
      padding: 0.45rem 0.8rem; border-radius: var(--radius-md);
      background: var(--glass-bg); border: 1px solid var(--glass-border);
      color: var(--text-secondary); text-decoration: none; font-size: 0.85rem;
      transition: var(--transition-smooth);
    }
    .nav-link:hover, .nav-link.active {
      color: var(--text-primary); border-color: var(--accent-primary);
      box-shadow: 0 0 12px var(--accent-glow);
    }

    /* 📤 UPLOAD STUDIO */
    .studio-container { max-width: 1200px; margin: 0 auto; padding: 1.5rem 1rem; }
    .studio-header { text-align: center; margin-bottom: 2rem; }
    .studio-title { font-size: 1.8rem; font-weight: 700; margin-bottom: 0.5rem; }
    .studio-subtitle { color: var(--text-secondary); font-size: 0.95rem; }

    /* 🎯 SMART DROP ZONE */
    .drop-zone {
      border: 2px dashed var(--glass-border); border-radius: var(--radius-lg);
      padding: 3rem 2rem; text-align: center; background: var(--glass-bg);
      transition: var(--transition-smooth); cursor: pointer; position: relative;
      overflow: hidden;
    }
    .drop-zone:hover, .drop-zone.dragover {
      border-color: var(--accent-primary); background: rgba(0,206,209,0.05);
      box-shadow: 0 0 25px var(--accent-glow);
    }
    .drop-zone::before {
      content: ""; position: absolute; inset: 0; opacity: 0;
      background: radial-gradient(circle at var(--mx,50%) var(--my,50%), rgba(0,206,209,0.15) 0%, transparent 60%);
      transition: opacity 0.2s; pointer-events: none;
    }
    .drop-zone.dragover::before { opacity: 1; }
    .drop-icon { font-size: 3rem; margin-bottom: 1rem; display: block; }
    .drop-text { font-size: 1.1rem; margin-bottom: 0.5rem; }
    .drop-hint { color: var(--text-secondary); font-size: 0.9rem; margin-bottom: 1.5rem; }
    .drop-actions { display: flex; gap: 0.8rem; justify-content: center; flex-wrap: wrap; }
    .btn {
      padding: 0.7rem 1.4rem; border-radius: var(--radius-md); font-weight: 600;
      cursor: pointer; transition: var(--transition-smooth); border: none;
      font-size: 0.95rem; display: inline-flex; align-items: center; gap: 0.4rem;
    }
    .btn-primary {
      background: linear-gradient(135deg, var(--accent-primary), var(--accent-light));
      color: #000;
    }
    .btn-primary:hover { box-shadow: 0 0 20px var(--accent-glow); transform: translateY(-2px); }
    .btn-secondary {
      background: var(--glass-bg); border: 1px solid var(--glass-border);
      color: var(--text-primary);
    }
    .btn-secondary:hover { border-color: var(--accent-primary); }
    #file-input, #camera-input { display: none; }

    /* 🖼️ PREVIEW GRID (Gallery-Style Cards) */
    .preview-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 1.2rem; margin-top: 2rem;
    }
    .preview-card {
      background: var(--glass-bg); border: 1px solid var(--glass-border);
      border-radius: var(--radius-lg); overflow: hidden; position: relative;
      animation: slideUp 0.4s ease;
    }
    @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    
    .card-thumb {
      width: 100%; height: 180px; background: #0a0c14;
      display: flex; align-items: center; justify-content: center;
      position: relative; overflow: hidden;
    }
    .card-thumb img, .card-thumb video { width: 100%; height: 100%; object-fit: cover; }
    .badge {
      position: absolute; top: 0.6rem; right: 0.6rem;
      padding: 0.2rem 0.5rem; background: rgba(0,0,0,0.6);
      backdrop-filter: blur(4px); border-radius: var(--radius-sm);
      font-size: 0.75rem; font-weight: 500; color: #fff;
    }
    .card-info { padding: 0.8rem; }
    .card-title { font-size: 0.95rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 0.3rem; }
    .card-meta { display: flex; justify-content: space-between; font-size: 0.8rem; color: var(--text-secondary); margin-bottom: 0.6rem; }
    .card-actions { display: flex; gap: 0.5rem; }
    .action-btn {
      flex: 1; padding: 0.4rem; background: rgba(0,206,209,0.1);
      border: 1px solid var(--glass-border); border-radius: var(--radius-sm);
      color: var(--text-primary); font-size: 0.8rem; cursor: pointer;
      transition: var(--transition-smooth); text-align: center;
    }
    .action-btn:hover { background: rgba(0,206,209,0.25); border-color: var(--accent-primary); }
    .action-btn.confirm { background: var(--accent-primary); color: #000; font-weight: 600; }
    .action-btn.cancel { border-color: #ff6b9d; color: #ff6b9d; }
    .action-btn.cancel:hover { background: rgba(255,107,157,0.1); }

    /* 🎵 AUDIO VISUALIZER */
    .audio-card .card-thumb { background: linear-gradient(135deg, rgba(0,206,209,0.1), rgba(32,178,170,0.05)); }
    .audio-visual { display: flex; align-items: center; justify-content: center; gap: 0.3rem; height: 100%; }
    .audio-bar { width: 4px; background: var(--accent-primary); border-radius: 2px; animation: pulse 1s infinite alternate; }
    @keyframes pulse { from { height: 10%; } to { height: 90%; } }

    /* 🎬 VIDEO OVERLAY */
    .video-overlay {
      position: absolute; inset: 0; background: rgba(0,0,0,0.6);
      backdrop-filter: blur(8px); display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: opacity 0.3s;
    }
    .video-overlay:hover { opacity: 0.9; }
    .play-btn {
      width: 50px; height: 50px; background: var(--accent-primary);
      border-radius: 50%; display: flex; align-items: center; justify-content: center;
      font-size: 1.2rem; color: #000; transition: transform 0.2s;
    }
    .play-btn:hover { transform: scale(1.1); }

    /* 📊 UPLOAD PROGRESS */
    .upload-progress {
      margin-top: 2rem; padding: 1.5rem; background: var(--glass-bg);
      border: 1px solid var(--glass-border); border-radius: var(--radius-lg);
      display: none; text-align: center;
    }
    .upload-progress.visible { display: block; animation: fadeIn 0.3s ease; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .progress-ring {
      width: 100px; height: 100px; margin: 0 auto 1rem; position: relative;
    }
    .progress-ring svg { transform: rotate(-90deg); }
    .progress-ring__bg { stroke: var(--glass-border); stroke-width: 6; fill: none; }
    .progress-ring__fill {
      stroke: var(--accent-primary); stroke-width: 6; fill: none;
      stroke-linecap: round; stroke-dasharray: 251; stroke-dashoffset: 251;
      transition: stroke-dashoffset 0.2s linear;
    }
    .progress-text {
      position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
      font-family: var(--font-mono); font-weight: 600; color: var(--accent-primary);
    }
    .progress-status { color: var(--text-secondary); font-size: 0.9rem; }

    /* 💬 TOAST */
    .toast {
      position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%) translateY(100px);
      background: var(--bg-mid); border: 1px solid var(--glass-border);
      padding: 0.8rem 1.5rem; border-radius: var(--radius-md); z-index: 1000;
      display: flex; align-items: center; gap: 0.6rem; transition: transform 0.3s ease;
      box-shadow: 0 10px 40px rgba(0,0,0,0.4);
    }
    .toast.visible { transform: translateX(-50%) translateY(0); }
    .toast.success { border-color: var(--accent-primary); }
    .toast.error { border-color: #ff6b9d; }
    .toast-icon { font-size: 1.2rem; }

    /* 📱 RESPONSIVE */
    @media (max-width: 640px) {
      .nav { flex-wrap: wrap; padding: 0.8rem 1rem; }
      .nav-links { width: 100%; justify-content: center; margin-top: 0.5rem; }
      .drop-zone { padding: 2rem 1rem; }
      .preview-grid { grid-template-columns: 1fr; }
      .card-actions { flex-direction: column; }
    }
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; transform: none !important; }
    }
  </style>
</head>
<body>
  <div class="depth-bg"></div>

  <nav class="nav">
    <div class="logo">MCALTONZ 2026</div>
    <div class="nav-links">
      <a href="index.html" class="nav-link">Home</a>
      <a href="private.html" class="nav-link">Private</a>
      <a href="dashboard.html" class="nav-link">Dashboard</a>
      <a href="admin-ready.html" class="nav-link">Admin</a>
      <a href="upload.html" class="nav-link active">Upload</a>
      <a href="gallery.html" class="nav-link">Gallery</a>
    </div>
  </nav>

  <main class="studio-container">
    <div class="studio-header">
      <h1 class="studio-title">📤 Upload Studio</h1>
      <p class="studio-subtitle">Drag, drop, or capture. Preview instantly. Save to cloud when ready.</p>
    </div>

    <!-- 🎯 SMART DROP ZONE -->
    <div class="drop-zone" id="drop-zone" tabindex="0">
      <span class="drop-icon">☁️</span>
      <div class="drop-text">Drop media here or click to browse</div>
      <div class="drop-hint">Supports: JPG, PNG, GIF, MP3, WAV, MP4, WEBM • Max 100MB</div>
      <div class="drop-actions">
        <label class="btn btn-primary" for="file-input">
          📁 Browse Files
          <input type="file" id="file-input" accept="image/*,audio/*,video/*" multiple>
        </label>
        <label class="btn btn-secondary" for="camera-input">
          📸 Camera
          <input type="file" id="camera-input" accept="image/*,video/*" capture="environment">
        </label>
      </div>
    </div>

    <!-- 🖼️ PREVIEW GRID (Gallery-Style) -->
    <div class="preview-grid" id="preview-grid"></div>

    <!-- 📊 UPLOAD PROGRESS -->
    <div class="upload-progress" id="upload-progress">
      <div class="progress-ring">
        <svg width="100" height="100">
          <circle class="progress-ring__bg" cx="50" cy="50" r="40"/>
          <circle class="progress-ring__fill" cx="50" cy="50" r="40" id="progress-fill"/>
        </svg>
        <div class="progress-text" id="progress-text">0%</div>
      </div>
      <div class="progress-status" id="progress-status">Uploading...</div>
    </div>
  </main>

  <!-- 💬 TOAST -->
  <div class="toast" id="toast">
    <span class="toast-icon" id="toast-icon">✓</span>
    <span class="toast-msg" id="toast-msg">Upload successful!</span>
  </div>

  <!-- Supabase SDK -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  
  <script>
    // 🔐 SUPABASE CONFIG
    const SUPABASE_URL = 'https://zmtudgbebtnoiysebeli.supabase.co'
    const SUPABASE_ANON_KEY = 'sb_publishable_U22LM59-HGzGBp0xk8Ouxg_CGngfga8'
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY)

    // DOM Elements
    const dropZone = document.getElementById('drop-zone')
    const fileInput = document.getElementById('file-input')
    const cameraInput = document.getElementById('camera-input')
    const previewGrid = document.getElementById('preview-grid')
    const uploadProgress = document.getElementById('upload-progress')
    const progressFill = document.getElementById('progress-fill')
    const progressText = document.getElementById('progress-text')
    const progressStatus = document.getElementById('progress-status')
    const toast = document.getElementById('toast')
    const toastIcon = document.getElementById('toast-icon')
    const toastMsg = document.getElementById('toast-msg')

    let pendingUploads = []

    // ✅ UI ENGINE
    (function initUploadStudio() {
      // Drop Zone Events
      ;['dragenter', 'dragover', 'dragleave', 'drop'].forEach(evt => {
        dropZone.addEventListener(evt, e => { e.preventDefault(); e.stopPropagation() })
      })
      ;['dragenter', 'dragover'].forEach(evt => {
        dropZone.addEventListener(evt, () => dropZone.classList.add('dragover'))
      })
      ;['dragleave', 'drop'].forEach(evt => {
        dropZone.addEventListener(evt, () => dropZone.classList.remove('dragover'))
      })
      dropZone.addEventListener('drop', (e) => {
        const files = Array.from(e.dataTransfer.files)
        files.forEach(handleFileSelect)
      })
      dropZone.addEventListener('click', () => fileInput.click())
      dropZone.addEventListener('keypress', (e) => { if (e.key === 'Enter') fileInput.click() })

      // File Inputs
      fileInput.addEventListener('change', (e) => Array.from(e.target.files).forEach(handleFileSelect))
      cameraInput.addEventListener('change', (e) => Array.from(e.target.files).forEach(handleFileSelect))

      // Mouse Glow
      dropZone.addEventListener('mousemove', (e) => {
        const rect = dropZone.getBoundingClientRect()
        dropZone.style.setProperty('--mx', `${((e.clientX - rect.left) / rect.width) * 100}%`)
        dropZone.style.setProperty('--my', `${((e.clientY - rect.top) / rect.height) * 100}%`)
      })
    })()

    // 🖼️ Handle File Select → Instant Preview Card
    function handleFileSelect(file) {
      if (!validateFile(file)) return
      
      const id = Date.now() + Math.random().toString(36).slice(2)
      const previewUrl = URL.createObjectURL(file)
      
      // Add to pending
      pendingUploads.push({ id, file, previewUrl })
      
      // Render card
      renderPreviewCard({ id, file, previewUrl })
      
      // Scroll to preview
      document.getElementById(`card-${id}`)?.scrollIntoView({ behavior: 'smooth', block: 'center' })
    }

    function validateFile(file) {
      const validTypes = ['image/jpeg','image/png','image/gif','audio/mpeg','audio/wav','video/mp4','video/webm']
      const maxSize = 100 * 1024 * 1024
      if (!validTypes.includes(file.type)) { showToast('❌ Unsupported type', 'error'); return false }
      if (file.size > maxSize) { showToast('❌ File too large (max 100MB)', 'error'); return false }
      return true
    }

    function renderPreviewCard({ id, file, previewUrl }) {
      const card = document.createElement('div')
      card.className = `preview-card ${file.type.startsWith('audio') ? 'audio-card' : ''}`
      card.id = `card-${id}`
      
      let thumb = '', badge = file.type.split('/')[1].toUpperCase()
      
      if (file.type.startsWith('image/')) {
        thumb = `<img src="${previewUrl}" alt="${file.name}" loading="lazy">`
      } else if (file.type.startsWith('audio/')) {
        thumb = `<div class="audio-visual">${'<div class="audio-bar" style="animation-delay:'+Math.random()*0.5+'s"></div>'.repeat(12)}</div>`
      } else if (file.type.startsWith('video/')) {
        thumb = `<div class="video-overlay"><div class="play-btn">▶</div></div><video src="${previewUrl}" muted style="display:none"></video>`
      }
      
      card.innerHTML = `
        <div class="card-thumb">${thumb}<span class="badge">${badge}</span></div>
        <div class="card-info">
          <div class="card-title" title="${file.name}">${file.name}</div>
          <div class="card-meta">
            <span>${formatBytes(file.size)}</span>
            <span>${file.type.split('/')[0].toUpperCase()}</span>
          </div>
          <div class="card-actions">
            <button class="action-btn cancel" data-action="remove">🗑️ Remove</button>
            <button class="action-btn confirm" data-action="upload">✅ Save to Cloud</button>
          </div>
        </div>
      `
      
      previewGrid.appendChild(card)
      
      // Event bindings
      card.querySelector('[data-action="remove"]').addEventListener('click', () => {
        URL.revokeObjectURL(previewUrl)
        pendingUploads = pendingUploads.filter(p => p.id !== id)
        card.remove()
        showToast('🗑️ Removed from queue')
      })
      
      card.querySelector('[data-action="upload"]').addEventListener('click', () => {
        startUpload(id, file, previewUrl, card)
      })
      
      // Video play on overlay click
      if (file.type.startsWith('video/')) {
        const overlay = card.querySelector('.video-overlay')
        const video = card.querySelector('video')
        overlay.addEventListener('click', () => {
          video.style.display = 'block'
          overlay.style.display = 'none'
          video.play()
        })
      }
    }

    // 🚀 Upload Engine (Supabase Integration - Commented for Demo)
    async function startUpload(id, file, previewUrl, card) {
      // Disable buttons
      card.querySelector('[data-action="upload"]').disabled = true
      card.querySelector('[data-action="upload"]').textContent = '⏳ Uploading...'
      
      // Show progress section if first upload
      if (!uploadProgress.classList.contains('visible')) {
        uploadProgress.classList.add('visible')
      }
      
      // ⚠️ REAL SUPABASE UPLOAD (Uncomment when ready):
      /*
      const {  { user } } = await supabase.auth.getUser()
      if (!user) { showToast('❌ Please sign in first', 'error'); return }
      
      const fileName = `${user.id}/${Date.now()}_${file.name}`
      const {  uploadData, error: uploadError } = await supabase.storage
        .from('uploads')
        .upload(fileName, file, { cacheControl: '3600', upsert: false })
      
      if (uploadError) { showToast('❌ Upload failed', 'error'); return }
      
      const { error: insertError } = await supabase.from('uploads')
        .insert({
          user_email: user.email,
          file_name: file.name,
          file_path: uploadData.path,
          file_type: file.type,
          file_size: file.size
        })
      
      if (insertError) { showToast('❌ Database error', 'error'); return }
      */
      
      // 🎯 DEMO MODE: Simulate progress
      simulateUploadProgress(() => {
        // Success
        showToast('✅ Saved to cloud!', 'success')
        
        // Remove from pending + card
        pendingUploads = pendingUploads.filter(p => p.id !== id)
        URL.revokeObjectURL(previewUrl)
        card.style.opacity = '0.5'
        card.querySelector('[data-action="upload"]').textContent = '✓ Done'
        
        // Redirect to gallery after 1.5s (optional)
        setTimeout(() => {
          if (pendingUploads.length === 0) {
            // window.location.href = 'gallery.html'
          }
        }, 1500)
      })
    }

    // 🎯 Progress Simulation
    function simulateUploadProgress(onComplete) {
      const circumference = 2 * Math.PI * 40
      let progress = 0
      const interval = setInterval(() => {
        progress += Math.random() * 12
        if (progress >= 100) {
          progress = 100; clearInterval(interval)
          progressStatus.textContent = 'Finalizing...'
          setTimeout(onComplete, 300)
        } else {
          progressStatus.textContent = `Uploading... ${Math.round(progress)}%`
        }
        const offset = circumference - (progress / 100) * circumference
        progressFill.style.strokeDashoffset = offset
        progressText.textContent = `${Math.round(progress)}%`
      }, 180)
    }

    // 💬 Toast
    function showToast(message, type = 'success') {
      toastIcon.textContent = type === 'success' ? '✅' : '❌'
      toastMsg.textContent = message
      toast.className = `toast ${type} visible`
      setTimeout(() => toast.classList.remove('visible'), 2500)
    }

    // 🛠️ Utils
    function formatBytes(bytes) {
      if (bytes === 0) return '0 B'
      const k = 1024, sizes = ['B','KB','MB','GB'], i = Math.floor(Math.log(bytes)/Math.log(k))
      return parseFloat((bytes/Math.pow(k,i)).toFixed(1)) + ' ' + sizes[i]
    }

    // Expose
    window.handleFileSelect = handleFileSelect
  </script>
</body>
</html>
