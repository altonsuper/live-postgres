<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>📤 Upload - MCALTONZ 2026</title>
  <style>
    :root {
      --bg-deep: #040508; --accent-primary: #00ced1;
      --glass-bg: rgba(255,255,255,0.04); --glass-border: rgba(0,206,209,0.15);
      --text-primary: #e8f0ff; --text-secondary: #8a9ab0;
      --radius-lg: 18px; --radius-md: 10px;
      --font-main: system-ui, -apple-system, sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg-deep); color: var(--text-primary);
      font-family: var(--font-main); min-height: 100vh; padding: 2rem;
    }
    .container { max-width: 600px; margin: 0 auto; }
    h1 { text-align: center; margin-bottom: 2rem; color: var(--accent-primary); }
    .drop-zone {
      border: 2px dashed var(--glass-border); border-radius: var(--radius-lg);
      padding: 3rem 2rem; text-align: center; background: var(--glass-bg);
      cursor: pointer; transition: all 0.3s;
    }
    .drop-zone:hover { border-color: var(--accent-primary); }
    .drop-zone.dragover { background: rgba(0,206,209,0.1); }
    input[type="file"] { display: none; }
    .btn {
      padding: 0.8rem 1.5rem; margin-top: 1rem;
      background: var(--accent-primary); color: #000;
      border: none; border-radius: var(--radius-md);
      font-weight: 600; cursor: pointer;
    }
    .preview { margin-top: 1.5rem; padding: 1rem; background: var(--glass-bg); border-radius: var(--radius-md); }
    .preview img { max-width: 100%; max-height: 300px; border-radius: var(--radius-md); }
    .progress { margin-top: 1rem; text-align: center; display: none; }
    .progress.visible { display: block; }
    .progress-bar {
      width: 100%; height: 8px; background: var(--glass-bg);
      border-radius: var(--radius-md); overflow: hidden; margin: 0.5rem 0;
    }
    .progress-fill {
      height: 100%; background: var(--accent-primary);
      width: 0%; transition: width 0.3s;
    }
    .toast {
      position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%);
      padding: 0.8rem 1.5rem; background: var(--glass-bg);
      border: 1px solid var(--glass-border); border-radius: var(--radius-md);
      display: none; z-index: 1000;
    }
    .toast.show { display: block; }
    .toast.error { border-color: #ff6b9d; }
    .toast.success { border-color: var(--accent-primary); }
  </style>
</head>
<body>
  <div class="container">
    <h1>📤 Upload Media</h1>
    
    <div class="drop-zone" id="drop-zone">
      <p>📁 Drop files here or click to browse</p>
      <p style="color:var(--text-secondary); font-size:0.9rem; margin-top:0.5rem">Supports: JPG, PNG, MP4, WEBM, MP3</p>
      <input type="file" id="file-input" accept="image/*,video/*,audio/*">
    </div>

    <div class="preview" id="preview" style="display:none">
      <h3 style="margin-bottom:0.5rem">Preview</h3>
      <div id="preview-content"></div>
      <button class="btn" id="upload-btn" style="width:100%; margin-top:1rem">✅ Upload to Cloud</button>
    </div>

    <div class="progress" id="progress">
      <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
      <p id="progress-text" style="color:var(--text-secondary); font-size:0.9rem">Uploading...</p>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    // 🔐 SUPABASE CONFIG
    const supabase = window.supabase.createClient(
      'https://zmtudgbebtnoiysebeli.supabase.co',
      'sb_publishable_U22LM59-HGzGBp0xk8Ouxg_CGngfga8'
    )

    // DOM Elements
    const dropZone = document.getElementById('drop-zone')
    const fileInput = document.getElementById('file-input')
    const preview = document.getElementById('preview')
    const previewContent = document.getElementById('preview-content')
    const uploadBtn = document.getElementById('upload-btn')
    const progress = document.getElementById('progress')
    const progressFill = document.getElementById('progress-fill')
    const progressText = document.getElementById('progress-text')
    const toast = document.getElementById('toast')

    let selectedFile = null
    let previewUrl = null

    // Drop Zone Events
    dropZone.onclick = () => fileInput.click()
    dropZone.ondragover = (e) => { e.preventDefault(); dropZone.classList.add('dragover') }
    dropZone.ondragleave = () => dropZone.classList.remove('dragover')
    dropZone.ondrop = (e) => {
      e.preventDefault()
      dropZone.classList.remove('dragover')
      if (e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0])
    }
    fileInput.onchange = (e) => { if (e.target.files[0]) handleFile(e.target.files[0]) }

    // Handle File
    function handleFile(file) {
      selectedFile = file
      previewUrl = URL.createObjectURL(file)
      
      if (file.type.startsWith('image/')) {
        previewContent.innerHTML = `<img src="${previewUrl}" alt="${file.name}">`
      } else if (file.type.startsWith('video/')) {
        previewContent.innerHTML = `<video src="${previewUrl}" controls style="max-width:100%"></video>`
      } else if (file.type.startsWith('audio/')) {
        previewContent.innerHTML = `<audio src="${previewUrl}" controls style="width:100%"></audio>`
      }
      
      previewContent.innerHTML += `<p style="margin-top:0.5rem; color:var(--text-secondary); font-size:0.9rem">${file.name} • ${(file.size/1024).toFixed(1)} KB</p>`
      preview.style.display = 'block'
    }

    // Upload Button
    uploadBtn.onclick = async () => {
      if (!selectedFile) return
      if (!await checkAuth()) return
      
      progress.classList.add('visible')
      uploadBtn.disabled = true
      
      try {
        // Get user email
        const {  { user } } = await supabase.auth.getUser()
        const userEmail = user.email.replace(/[^a-zA-Z0-9]/g, '_')
        
        // Upload to Storage
        const fileExt = selectedFile.name.split('.').pop()
        const fileName = `${userEmail}/${Date.now()}_${Math.random().toString(36).slice(2)}.${fileExt}`
        
        const {  uploadData, error: uploadError } = await supabase.storage
          .from('uploads')
          .upload(fileName, selectedFile, { cacheControl: '3600' })
        
        if (uploadError) throw uploadError
        
        // Save to Database
        const {  } = supabase.storage.from('uploads').getPublicUrl(fileName)
        
        const { error: dbError } = await supabase.from('uploads').insert({
          user_email: user.email,
          file_name: selectedFile.name,
          file_path: publicUrl,
          file_type: selectedFile.type,
          file_size: selectedFile.size
        })
        
        if (dbError) throw dbError
        
        showToast('✅ Upload successful!', 'success')
        setTimeout(() => window.location.href = 'gallery.html', 1500)
        
      } catch (err) {
        console.error('Upload error:', err)
        showToast('❌ ' + err.message, 'error')
        progress.classList.remove('visible')
        uploadBtn.disabled = false
      }
    }

    // Check Auth
    async function checkAuth() {
      const {  { session } } = await supabase.auth.getSession()
      if (!session) {
        showToast('❌ Please login first', 'error')
        setTimeout(() => window.location.href = 'index.html', 1500)
        return false
      }
      return true
    }

    // Toast
    function showToast(msg, type = 'success') {
      toast.textContent = msg
      toast.className = `toast ${type} show`
      setTimeout(() => toast.classList.remove('show'), 3000)
    }
  </script>
</body>
</html>
