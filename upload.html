<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>📤 Upload - MCALTONZ 2026</title>
  <style>
    :root{--bg:#040508;--accent:#00ced1;--glass:rgba(255,255,255,0.04);--border:rgba(0,206,209,0.15);--text:#e8f0ff;--sec:#8a9ab0}
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:var(--bg);color:var(--text);font-family:system-ui,sans-serif;min-height:100vh;padding:2rem}
    .container{max-width:600px;margin:0 auto}
    h1{text-align:center;color:var(--accent);margin-bottom:2rem}
    .drop{border:2px dashed var(--border);border-radius:18px;padding:3rem 2rem;text-align:center;background:var(--glass);cursor:pointer;transition:all 0.3s}
    .drop:hover{border-color:var(--accent);background:rgba(0,206,209,0.05)}
    input[type="file"]{display:none}
    .preview{margin-top:1.5rem;padding:1rem;background:var(--glass);border-radius:12px;display:none}
    .preview.show{display:block;animation:slideIn 0.3s ease}
    @keyframes slideIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
    .preview img,.preview video,.preview audio{max-width:100%;margin-bottom:0.5rem;border-radius:8px}
    .btn{width:100%;padding:0.8rem;margin-top:1rem;background:var(--accent);color:#000;border:none;border-radius:8px;font-weight:600;cursor:pointer;font-size:1rem}
    .btn:disabled{opacity:0.6;cursor:not-allowed}
    .toast{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%);padding:0.8rem 1.5rem;background:var(--glass);border:1px solid var(--border);border-radius:8px;display:none;z-index:999}
    .toast.show{display:block;animation:slideUp 0.3s}
    @keyframes slideUp{from{transform:translateX(-50%) translateY(20px)}to{transform:translateX(-50%) translateY(0)}}
  </style>
</head>
<body>
  <div class="container">
    <h1>📤 Upload Media</h1>
    <div class="drop" id="dropZone">
      <p style="font-size:1.2rem;margin-bottom:0.5rem">📁</p>
      <p>Drop files here or click to browse</p>
      <p style="color:var(--sec);font-size:0.9rem;margin-top:0.5rem">Supports: JPG, PNG, MP4, WEBM, MP3, PDF, HTML</p>
      <input type="file" id="fileInput" accept="image/*,video/*,audio/*,.pdf,.html,.txt" />
    </div>
    <div class="preview" id="preview">
      <h3 style="margin-bottom:1rem">🔍 Preview</h3>
      <div id="media" style="background:rgba(0,0,0,0.2);border-radius:8px;padding:1rem;margin-bottom:1rem;min-height:200px;display:flex;align-items:center;justify-content:center"></div>
      <p id="info" style="color:var(--sec);font-size:0.9rem;text-align:center"></p>
      <button class="btn" id="uploadBtn">✅ Upload to Cloud</button>
    </div>
  </div>
  <div class="toast" id="toast"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = "https://zmtudgbebtnoiysebeli.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_U22LM59-HGzGBp0xk8Ouxg_CGngfga8";
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    
    const dropZone = document.getElementById('dropZone');
    const fileInput = document.getElementById('fileInput');
    const preview = document.getElementById('preview');
    const media = document.getElementById('media');
    const info = document.getElementById('info');
    const uploadBtn = document.getElementById('uploadBtn');
    const toast = document.getElementById('toast');
    
    let selectedFile = null;
    const GUEST_EMAIL = "guest@anonymous"; // Temporary identifier

    dropZone.onclick = () => fileInput.click();
    fileInput.onchange = (e) => {
      const f = e.target.files[0]; if (!f) return;
      selectedFile = f;
      const url = URL.createObjectURL(f);
      
      if (f.type.startsWith('image/')) media.innerHTML = `<img src="${url}" alt="${f.name}">`;
      else if (f.type.startsWith('video/')) media.innerHTML = `<video src="${url}" controls></video>`;
      else if (f.type.startsWith('audio/')) media.innerHTML = `<audio src="${url}" controls style="width:100%">`;
      else media.innerHTML = `<div style="font-size:3rem">📄</div><p style="margin-top:0.5rem">${f.name.split('.').pop().toUpperCase()}</p>`;
      
      info.textContent = `${f.name} • ${(f.size/1024).toFixed(1)} KB`;
      preview.classList.add('show');
    };

    uploadBtn.onclick = async () => {
      if (!selectedFile) return;
      uploadBtn.disabled = true; uploadBtn.textContent = '⏳ Uploading...';
      
      try {
        // Guest folder
        const ext = selectedFile.name.split('.').pop();
        const path = `guest/${Date.now()}.${ext}`;
        
        // Upload to Storage
        const { error: upErr } = await supabase.storage.from('user-uploads').upload(path, selectedFile);
        if (upErr) throw upErr;
        
        // Get public URL
        const {  } = await supabase.storage.from('user-uploads').getPublicUrl(path);
        
        // Save to DB (as guest)
        const { error: dbErr } = await supabase.from('uploads').insert({
          user_email: GUEST_EMAIL,
          file_name: selectedFile.name,
          file_path: publicUrl,
          file_type: selectedFile.type || 'application/octet-stream',
          file_size: selectedFile.size
        });
        if (dbErr) throw dbErr;
        
        showToast('✅ Upload successful!');
        setTimeout(() => window.location.href = 'gallery.html', 1000);
        
      } catch (err) {
        showToast('❌ ' + err.message);
        uploadBtn.disabled = false; uploadBtn.textContent = '✅ Upload to Cloud';
      }
    };

    function showToast(msg) {
      toast.textContent = msg; toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 3000);
    }
  </script>
</body>
</html>
