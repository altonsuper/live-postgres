<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>🔐 Admin Bridge</title>
  <style>
    body { background:#0a0a0f; color:#00ff9d; font-family:monospace; padding:2rem; max-width:500px; margin:0 auto; text-align:center; }
    input { width:100%; padding:1rem; margin:1rem 0; background:#1a1a2e; border:2px solid #00ff9d; color:#00ff9d; border-radius:4px; font-size:1rem; }
    button { padding:1rem 2rem; background:#1a1a2e; border:2px solid #00ff9d; color:#00ff9d; cursor:pointer; font-weight:bold; border-radius:4px; font-size:1rem; }
    button:hover { background:#00ff9d; color:#0a0a0f; }
    .hidden { display:none; }
    #status { margin:1rem 0; min-height:1.5rem; color:#ff6b6b; }
    a { color:#00ff9d; text-decoration:none; }
    a:hover { text-decoration:underline; }
    .key-hint { font-size:0.8rem; color:#666; margin-top:2rem; }
  </style>
</head>
<body>
  <h1>🔐 Admin Bridge</h1>
  <p>Enter your secret key to bypass login.</p>
  
  <input type="password" id="admin-key" placeholder="Enter secret key..." autocomplete="off">
  <button onclick="verifyKey()">🚀 Access Admin</button>
  <div id="status"></div>
  
  <p style="margin-top:2rem">
    <a href="index.html">← Public Login</a>
  </p>
  
  <div class="key-hint">
    💡 Tip: Or use direct URL:<br>
    <code>private.html?key=secret2026qwen</code>
  </div>

  <script>
    const ADMIN_KEY = 'secret2026qwen'
    
    // Check URL param first
    const urlParams = new URLSearchParams(window.location.search)
    const keyParam = urlParams.get('key')
    
    if (keyParam === ADMIN_KEY) {
      grantAccess()
    }
    
    function verifyKey() {
      const key = document.getElementById('admin-key').value.trim()
      const status = document.getElementById('status')
      
      if (key === ADMIN_KEY) {
        status.textContent = '✅ Valid. Redirecting...'
        status.style.color = '#00ff9d'
        localStorage.setItem('adminSession', 'true')
        localStorage.setItem('adminKey', ADMIN_KEY)
        setTimeout(grantAccess, 500)
      } else {
        status.textContent = '❌ Invalid key'
        document.getElementById('admin-key').value = ''
      }
    }
    
    function grantAccess() {
      window.location.href = 'upload.html?admin=true'
    }
    
    document.getElementById('admin-key').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') verifyKey()
    })
  </script>
</body>
</html>
