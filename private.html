<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>🔐 MCALTONZ 2026 // Cyber Lock</title>
  <style>
    /* 🌍 GLOBAL DESIGN SYSTEM (Sync with index.html) */
    :root {
      --bg-deep: #050508; --bg-mid: #0a0a12;
      --accent-cyan: #00f3ff; --accent-violet: #7000ff; --accent-pink: #ff2a6d;
      --accent-green: #00ff9d; /* Private page accent */
      --glass-bg: rgba(255,255,255,0.04); --glass-border: rgba(255,255,255,0.12);
      --text-primary: #e6e8ff; --text-secondary: #8a8da0;
      --radius-lg: 20px; --radius-md: 12px;
      --font-main: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      --font-mono: "SF Mono", "Fira Code", monospace;
      --transition-smooth: 0.4s cubic-bezier(0.16,1,0.3,1);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html { scroll-behavior: smooth; }
    body {
      background: var(--bg-deep); color: var(--text-primary);
      font-family: var(--font-main); overflow-x: hidden; min-height: 100vh;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 2rem; position: relative;
    }

    /* 🌐 DEPTH BACKGROUND (Lightweight) */
    .depth-bg {
      position: fixed; inset: 0; z-index: -1;
      background: radial-gradient(circle at 50% 10%, rgba(0,255,157,0.08) 0%, transparent 50%),
                  radial-gradient(circle at 20% 80%, rgba(112,0,255,0.1) 0%, transparent 40%),
                  var(--bg-deep);
    }
    .depth-bg::after {
      content: ""; position: absolute; inset: 0;
      background-image: linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
                        linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
      background-size: 40px 40px;
      mask-image: radial-gradient(ellipse at center, black 40%, transparent 70%);
      -webkit-mask-image: radial-gradient(ellipse at center, black 40%, transparent 70%);
      opacity: 0.5;
    }

    /* 🔐 LOCK CONTAINER */
    .lock-container {
      width: 100%; max-width: 420px; text-align: center;
      background: var(--glass-bg); border: 1px solid var(--glass-border);
      border-radius: var(--radius-lg); padding: 2.5rem 2rem;
      backdrop-filter: blur(12px); position: relative; overflow: hidden;
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    }
    .lock-container::before {
      content: ""; position: absolute; inset: 0; opacity: 0;
      background: radial-gradient(circle at var(--mx,50%) var(--my,50%), rgba(0,255,157,0.15) 0%, transparent 60%);
      transition: opacity 0.2s; pointer-events: none;
    }
    .lock-container.active::before { opacity: 1; }

    .logo {
      font-size: 1.3rem; font-weight: 800; letter-spacing: 3px; margin-bottom: 0.5rem;
      background: linear-gradient(90deg, var(--accent-green), var(--accent-cyan));
      -webkit-background-clip: text; background-clip: text; color: transparent;
    }
    .subtitle { color: var(--text-secondary); font-size: 0.95rem; margin-bottom: 2rem; }

    /* 🔑 HOLD-TO-UNLOCK BUTTON */
    .unlock-trigger {
      width: 100%; padding: 1.2rem; margin: 1rem 0;
      background: linear-gradient(135deg, rgba(0,255,157,0.1), rgba(0,243,255,0.05));
      border: 2px solid var(--accent-green); border-radius: var(--radius-md);
      color: var(--accent-green); font-family: var(--font-mono); font-size: 1rem;
      cursor: pointer; position: relative; overflow: hidden;
      transition: var(--transition-smooth); user-select: none;
      touch-action: manipulation;
    }
    .unlock-trigger:active, .unlock-trigger.holding {
      border-color: var(--accent-cyan); box-shadow: 0 0 25px rgba(0,255,157,0.4);
      transform: scale(0.99);
    }
    .unlock-trigger::after {
      content: ""; position: absolute; left: 0; top: 0; height: 100%;
      width: var(--progress, 0%); background: rgba(0,255,157,0.2);
      transition: width 0.1s linear; pointer-events: none;
    }
    .unlock-text { position: relative; z-index: 1; }

    /* 📊 PROGRESS RING */
    .progress-ring {
      width: 120px; height: 120px; margin: 1.5rem auto; position: relative;
    }
    .progress-ring svg { transform: rotate(-90deg); }
    .progress-ring__circle-bg {
      stroke: var(--glass-border); stroke-width: 4; fill: transparent;
    }
    .progress-ring__circle {
      stroke: var(--accent-green); stroke-width: 4; fill: transparent;
      stroke-linecap: round; stroke-dasharray: 283; stroke-dashoffset: 283;
      transition: stroke-dashoffset 0.1s linear, stroke 0.3s;
    }
    .progress-text {
      position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
      font-family: var(--font-mono); font-size: 1.2rem; color: var(--accent-green);
    }

    /* 📁 MANUAL KEY INPUT (Fallback) */
    .manual-input {
      margin-top: 1.5rem; padding-top: 1.5rem; border-top: 1px solid var(--glass-border);
    }
    .manual-input summary {
      color: var(--text-secondary); cursor: pointer; font-size: 0.9rem;
      user-select: none;
    }
    .manual-input input {
      width: 100%; padding: 0.8rem; margin: 0.8rem 0;
      background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border);
      border-radius: var(--radius-md); color: var(--text-primary);
      font-family: var(--font-mono);
    }
    .manual-input button {
      width: 100%; padding: 0.7rem; background: var(--glass-bg);
      border: 1px solid var(--accent-green); border-radius: var(--radius-md);
      color: var(--accent-green); cursor: pointer; font-weight: 500;
      transition: var(--transition-smooth);
    }
    .manual-input button:hover {
      background: rgba(0,255,157,0.1); box-shadow: 0 0 15px rgba(0,255,157,0.3);
    }

    /* 💬 STATUS */
    #status {
      margin: 1rem 0; min-height: 1.5rem; font-size: 0.95rem;
      color: var(--accent-pink); font-family: var(--font-mono);
    }
    #status.success { color: var(--accent-green); }

    /* 🔗 LINKS */
    .back-link {
      margin-top: 2rem; color: var(--text-secondary); text-decoration: none;
      font-size: 0.9rem; transition: var(--transition-smooth);
    }
    .back-link:hover { color: var(--accent-cyan); }

    /* ✨ SUCCESS ANIMATION */
    @keyframes bloom {
      0% { transform: scale(1); opacity: 1; }
      100% { transform: scale(3); opacity: 0; }
    }
    .bloom-effect {
      position: fixed; inset: 0; pointer-events: none; z-index: 999;
      background: radial-gradient(circle at center, rgba(0,255,157,0.4) 0%, transparent 70%);
      animation: bloom 0.6s ease-out forwards;
    }

    /* 📱 MOBILE OPTIMIZATION */
    @media (max-width: 480px) {
      .lock-container { padding: 2rem 1.5rem; }
      .unlock-trigger { padding: 1rem; font-size: 0.95rem; }
      .progress-ring { width: 100px; height: 100px; }
      .progress-text { font-size: 1rem; }
    }

    /* ♿ REDUCED MOTION */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        transition-duration: 0.01ms !important;
        transform: none !important;
      }
      .unlock-trigger::after { transition: none; }
    }
  </style>
</head>
<body>
  <div class="depth-bg"></div>

  <div class="lock-container" id="lock-container">
    <div class="logo">MCALTONZ 2026</div>
    <p class="subtitle">🔐 Cyber Lock — Hold to unlock the gateway</p>

    <!-- 🎯 HOLD-TO-UNLOCK TRIGGER -->
    <button class="unlock-trigger" id="unlock-trigger" touch-action="none">
      <span class="unlock-text" id="unlock-text">👆 Tap & Hold 2s to Unlock</span>
    </button>

    <!-- 📊 PROGRESS RING -->
    <div class="progress-ring">
      <svg width="120" height="120">
        <circle class="progress-ring__circle-bg" cx="60" cy="60" r="45"/>
        <circle class="progress-ring__circle" cx="60" cy="60" r="45" id="progress-circle"/>
      </svg>
      <div class="progress-text" id="progress-text">0%</div>
    </div>

    <!-- 💬 STATUS -->
    <div id="status"></div>

    <!-- 📁 MANUAL KEY INPUT (Fallback) -->
    <details class="manual-input">
      <summary>⌨️ Or enter key manually</summary>
      <input type="password" id="admin-key" placeholder="Enter secret key..." autocomplete="off">
      <button onclick="verifyKey()">🚀 Validate</button>
    </details>

    <!-- 🔗 BACK LINK -->
    <a href="index.html" class="back-link">← Back to Portal</a>
  </div>

  <script>
    // 🔐 ORIGINAL LOGIC — UNCHANGED (SAFE)
    const ADMIN_KEY = 'secret2026qwen'
    const urlParams = new URLSearchParams(window.location.search)
    const keyParam = urlParams.get('key')
    
    if (keyParam === ADMIN_KEY) { grantAccess() }
    
    function verifyKey() {
      const key = document.getElementById('admin-key')?.value.trim()
      const status = document.getElementById('status')
      if (!key) return
      if (key === ADMIN_KEY) {
        status.textContent = '✅ Valid. Redirecting...'
        status.className = 'success'
        localStorage.setItem('adminSession', 'true')
        localStorage.setItem('adminKey', ADMIN_KEY)
        triggerSuccess()
      } else {
        status.textContent = '❌ Invalid key'
        status.className = ''
        if (navigator.vibrate) navigator.vibrate([50,100,50])
        document.getElementById('admin-key').value = ''
      }
    }
    
    function grantAccess() {
      window.location.href = 'upload.html?admin=true'
    }
    
    function triggerSuccess() {
      // Bloom effect
      const bloom = document.createElement('div')
      bloom.className = 'bloom-effect'
      document.body.appendChild(bloom)
      // Haptic
      if (navigator.vibrate) navigator.vibrate([30,50,30])
      // Redirect
      setTimeout(grantAccess, 600)
    }

    // 🎯 NEW: HOLD-TO-UNLOCK ENGINE (Lightweight)
    (function() {
      const trigger = document.getElementById('unlock-trigger')
      const text = document.getElementById('unlock-text')
      const circle = document.getElementById('progress-circle')
      const progressText = document.getElementById('progress-text')
      const container = document.getElementById('lock-container')
      const status = document.getElementById('status')
      
      const HOLD_DURATION = 2000 // 2 seconds
      const CIRCUMFERENCE = 2 * Math.PI * 45 // r=45
      let holdTimer = null
      let startTime = null
      let animationFrame = null

      function updateProgress(percent) {
        const offset = CIRCUMFERENCE - (percent / 100) * CIRCUMFERENCE
        circle.style.strokeDashoffset = offset
        progressText.textContent = `${Math.round(percent)}%`
        trigger.style.setProperty('--progress', `${percent}%`)
        // Glow intensity
        const glow = 0.1 + (percent / 100) * 0.4
        circle.style.stroke = `rgba(0,255,157,${glow})`
      }

      function startHold(e) {
        e?.preventDefault()
        if (holdTimer) return
        container.classList.add('active')
        text.textContent = '🔓 Holding...'
        startTime = Date.now()
        
        function animate() {
          const elapsed = Date.now() - startTime
          const percent = Math.min((elapsed / HOLD_DURATION) * 100, 100)
          updateProgress(percent)
          
          if (percent >= 100) {
            completeHold()
          } else {
            animationFrame = requestAnimationFrame(animate)
          }
        }
        animationFrame = requestAnimationFrame(animate)
      }

      function cancelHold() {
        if (!holdTimer) return
        container.classList.remove('active')
        text.textContent = '👆 Tap & Hold 2s to Unlock'
        updateProgress(0)
        cancelAnimationFrame(animationFrame)
        holdTimer = null
        startTime = null
      }

      function completeHold() {
        cancelAnimationFrame(animationFrame)
        container.classList.remove('active')
        text.textContent = '✅ Unlocked!'
        updateProgress(100)
        // Auto validate
        status.textContent = '🔑 Key verified. Opening...'
        status.className = 'success'
        localStorage.setItem('adminSession', 'true')
        localStorage.setItem('adminKey', ADMIN_KEY)
        triggerSuccess()
      }

      // Event listeners (mouse + touch)
      const startEvents = ['mousedown', 'touchstart']
      const endEvents = ['mouseup', 'mouseleave', 'touchend', 'touchcancel']
      
      startEvents.forEach(evt => trigger.addEventListener(evt, startHold, { passive: false }))
      endEvents.forEach(evt => trigger.addEventListener(evt, cancelHold))
      
      // Keyboard support (Enter/Space)
      trigger.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); startHold(e) }
      })
      trigger.addEventListener('keyup', (e) => {
        if (e.key === 'Enter' || e.key === ' ') cancelHold()
      })

      // Init: check if already unlocked via URL
      if (keyParam === ADMIN_KEY) {
        updateProgress(100)
        text.textContent = '✅ Already Unlocked'
      }
    })()
  </script>
</body>
</html>
