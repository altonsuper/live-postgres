<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Live Postgres</title>
  <style>
    body { background:#0a0a0f; color:#00ff9d; font-family:monospace; padding:2rem; }
    .msg { background:#1a1a2e; padding:1rem; margin:0.5rem 0; border-left:3px solid #00ff9d; }
  </style>
</head>
<body>
  <h1>🚀 PostgreSQL Live</h1>
  <div id="app">Loading...</div>

  <script>
    const URL = 'https://zmtudgbebtnoiysebeli.supabase.co/rest/v1/messages?select=content,created_at&order=created_at.desc'
    const KEY = 'sb_publishable_U22LM59-HGzGBp0xk8Ouxg_CGngfga8'

    fetch(URL, {
      headers: {
        'apikey': KEY,
        'Authorization': 'Bearer ' + KEY
      }
    })
    .then(r => r.json())
    .then(data => {
      document.getElementById('app').innerHTML = 
        data.map(d => `<div class="msg">${d.content}</div>`).join('')
    })
    .catch(e => {
      document.getElementById('app').textContent = '❌ ' + e.message
      console.error(e)
    })
  </script>
</body>
</html>
