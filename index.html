<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="google-site-verification" content="pnMO71pG0tx4Qb-05hMFPJd44bHPGA509iVMZzBE_NQ" />
  <title>🔐 MCALTONZ 2026</title>
  <style>
    :root { --bg:#040508; --accent:#00ced1; --glass:rgba(255,255,255,0.04); --border:rgba(0,206,209,0.15); --text:#e8f0ff; }
    * { box-sizing:border-box; margin:0; padding:0; }
    body { background:var(--bg); color:var(--text); font-family:system-ui,sans-serif; min-height:100vh; display:flex; align-items:center; justify-content:center; padding:1rem; }
    .card { background:var(--glass); border:1px solid var(--border); border-radius:18px; padding:2rem; width:100%; max-width:400px; }
    h1 { color:var(--accent); margin-bottom:1.5rem; text-align:center; }
    h2 { font-size:1.1rem; margin:1.5rem 0 0.8rem; }
    input { width:100%; padding:0.8rem; margin:0.3rem 0; background:rgba(0,0,0,0.3); border:1px solid var(--border); border-radius:8px; color:var(--text); }
    button { width:100%; padding:0.8rem; margin-top:0.8rem; background:var(--accent); color:#000; border:none; border-radius:8px; font-weight:600; cursor:pointer; }
    #msg { margin-top:1rem; text-align:center; min-height:1.2rem; }
    .success{color:#00ff9d} .error{color:#ff6b9d} .warning{color:orange}
  </style>
</head>
<body>
  <div class="card">
    <h1>🔐 MCALTONZ 2026</h1>
    <h2>Sign in</h2>
    <form id="signinForm">
      <input id="signinEmail" type="email" placeholder="Email" required />
      <input id="signinPassword" type="password" placeholder="Password" required />
      <button type="submit">Sign in</button>
    </form>
    <h2>Sign up</h2>
    <form id="signupForm">
      <input id="signupEmail" type="email" placeholder="Email" required />
      <input id="signupPassword" type="password" placeholder="Password" required />
      <button type="submit">Create account</button>
    </form>
    <p id="msg"></p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = "https://zmtudgbebtnoiysebeli.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_U22LM59-HGzGBp0xk8Ouxg_CGngfga8";
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    const msg = document.getElementById("msg");

    async function redirectIfAuthed() {
      const { data } = await supabase.auth.getSession();
      if (data?.session) window.location.href = "upload.html";
    }

    document.getElementById("signinForm").addEventListener("submit", async (e) => {
      e.preventDefault(); msg.textContent = ""; msg.className = "";
      const { error } = await supabase.auth.signInWithPassword({
        email: document.getElementById("signinEmail").value.trim(),
        password: document.getElementById("signinPassword").value
      });
      if (error) { msg.textContent = "❌ " + error.message; msg.className = "error"; return; }
      msg.textContent = "✅ Login successful!"; msg.className = "success";
      setTimeout(() => window.location.href = "upload.html", 800);
    });

    document.getElementById("signupForm").addEventListener("submit", async (e) => {
      e.preventDefault(); msg.textContent = ""; msg.className = "";
      const { data, error } = await supabase.auth.signUp({
        email: document.getElementById("signupEmail").value.trim(),
        password: document.getElementById("signupPassword").value
      });
      if (error) { msg.textContent = "❌ " + error.message; msg.className = "error"; return; }
      if (data?.session) { msg.textContent = "✅ Account created!"; msg.className = "success"; setTimeout(() => window.location.href = "upload.html", 800); }
      else { msg.textContent = "⚠️ Check your inbox"; msg.className = "warning"; }
    });

    redirectIfAuthed();
  </script>
</body>
</html>
