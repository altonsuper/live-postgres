<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Auth Test</title>
  <style>
    body { background:#0a0a0f; color:#00ff9d; font-family:monospace; padding:2rem; }
    button { padding:0.75rem 1.5rem; margin:0.5rem; background:#1a1a2e; border:1px solid #00ff9d; color:#00ff9d; cursor:pointer; }
    button:hover { background:#00ff9d; color:#0a0a0f; }
    #status { margin-top:1rem; padding:1rem; background:#1a1a2e; border-left:3px solid #00ff9d; }
  </style>
</head>
<body>
  <h1>🔐 Auth Test</h1>
  
  <!-- Always-visible buttons -->
  <button id="google">🔵 Google Login</button>
  <button id="github">🐙 GitHub Login</button>
  <button id="logout" style="display:none">🚪 Log Out</button>
  
  <div id="status">Loading auth state...</div>

  <script type="module">
    import { createClient } from 'https://esm.sh/@supabase/supabase-js'
    
    const supabase = createClient(
      'https://zmtudgbebtnoiysebeli.supabase.co',
      'sb_publishable_U22LM59-HGzGBp0xk8Ouxg_CGngfga8'
    )
    
    const status = document.getElementById('status')
    
    // Check auth on load
    const {  { session } } = await supabase.auth.getSession()
    updateUI(session?.user)
    
    // Listen for changes
    supabase.auth.onAuthStateChange((_, session) => {
      updateUI(session?.user)
    })
    
    function updateUI(user) {
      if (user) {
        status.innerHTML = `✅ Logged in: <strong>${user.email}</strong><br><small>Provider: ${user.app_metadata?.provider || 'email'}</small>`
        document.getElementById('logout').style.display = 'inline-block'
        document.getElementById('google').style.display = 'none'
        document.getElementById('github').style.display = 'none'
      } else {
        status.textContent = '🔓 Not logged in. Click a button to sign in.'
        document.getElementById('logout').style.display = 'none'
        document.getElementById('google').style.display = 'inline-block'
        document.getElementById('github').style.display = 'inline-block'
      }
    }
    
    // Wire up buttons (simple, no options)
    document.getElementById('google').onclick = async () => {
      status.textContent = '🔄 Redirecting to Google...'
      const { error } = await supabase.auth.signInWithOAuth({ provider: 'google' })
      if (error) status.textContent = '❌ ' + error.message
    }
    document.getElementById('github').onclick = async () => {
      status.textContent = '🔄 Redirecting to GitHub...'
      const { error } = await supabase.auth.signInWithOAuth({ provider: 'github' })
      if (error) status.textContent = '❌ ' + error.message
    }
    document.getElementById('logout').onclick = async () => {
      await supabase.auth.signOut()
      location.reload()
    }
    
    console.log('✅ Supabase client initialized')
  </script>
</body>
</html>
