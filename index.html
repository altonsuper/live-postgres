<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="google-site-verification" content="pnMO71pG0tx4Qb-05hMFPJd44bHPGA509iVMZzBE_NQ" />
  <title>🔐 MCALTONZ 2026</title>
  <style>
    :root { --bg:#040508; --accent:#00ced1; --glass:rgba(255,255,255,0.04); --border:rgba(0,206,209,0.15); --text:#e8f0ff; }
    * { box-sizing:border-box; margin:0; padding:0; }
    body { background:var(--bg); color:var(--text); font-family:system-ui,sans-serif; min-height:100vh; display:flex; align-items:center; justify-content:center; padding:1rem; }
    .card { background:var(--glass); border:1px solid var(--border); border-radius:18px; padding:2rem; width:100%; max-width:400px; }
    h1 { color:var(--accent); margin-bottom:1.5rem; text-align:center; }
    h2 { font-size:1.1rem; margin:1.5rem 0 0.8rem; }
    input { width:100%; padding:0.8rem; margin:0.3rem 0; background:rgba(0,0,0,0.3); border:1px solid var(--border); border-radius:8px; color:var(--text); font-size:1rem; }
    button { width:100%; padding:0.8rem; margin-top:0.8rem; background:var(--accent); color:#000; border:none; border-radius:8px; font-weight:600; cursor:pointer; font-size:1rem; }
    button:disabled { opacity:0.6; cursor:not-allowed; }
    button.secondary { background:transparent; border:1px solid var(--border); color:var(--text); }
    #msg { margin-top:1rem; text-align:center; min-height:1.2rem; font-size:0.95rem; }
    .success{color:#00ff9d} .error{color:#ff6b9d} .warning{color:orange}
    .hidden { display:none !important; }
    .debug { margin-top:1rem; padding:0.5rem; background:rgba(0,0,0,0.3); border-radius:4px; font-size:0.7rem; font-family:monospace; color:#888; white-space:pre-wrap; word-break:break-all; }
  </style>
</head>
<body>
  <div class="card">
    <h1>🔐 MCALTONZ 2026</h1>
    
    <!-- AUTH FORMS -->
    <div id="auth-section">
      <h2>Sign in</h2>
      <form id="signinForm">
        <input id="signinEmail" type="email" placeholder="Email" required autocomplete="email" />
        <input id="signinPassword" type="password" placeholder="Password" required autocomplete="current-password" />
        <button type="submit" id="signinBtn">Sign in</button>
      </form>

      <h2>Sign up</h2>
      <form id="signupForm">
        <input id="signupEmail" type="email" placeholder="Email" required autocomplete="email" />
        <input id="signupPassword" type="password" placeholder="Password" required autocomplete="new-password" />
        <button type="submit" id="signupBtn">Create account</button>
      </form>
    </div>

    <!-- DASHBOARD (Shown when logged in) -->
    <div id="dashboard-section" class="hidden">
      <p style="text-align:center; font-size:1.2rem; margin-bottom:1rem;">✅ <strong>Logged in!</strong></p>
      <p style="text-align:center; color:var(--accent); margin-bottom:1.5rem;" id="user-email"></p>
      
      <button onclick="manualRedirect()" style="background:#00ff9d;">📤 Go to Upload Page</button>
      <button onclick="doLogout()" class="secondary">🚪 Logout</button>
    </div>

    <p id="msg"></p>
    <div class="debug" id="debug">Initializing...</div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = "https://zmtudgbebtnoiysebeli.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_U22LM59-HGzGBp0xk8Ouxg_CGngfga8";
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    
    const msg = document.getElementById("msg");
    const debug = document.getElementById("debug");
    const authSection = document.getElementById("auth-section");
    const dashboardSection = document.getElementById("dashboard-section");
    const userEmail = document.getElementById("user-email");

    let logCount = 0;
    function log(text) {
      logCount++;
      const timestamp = new Date().toLocaleTimeString();
      const logMsg = `[${timestamp}] ${text}`;
      console.log('[Auth]', text);
      debug.textContent += logMsg + '\n';
      debug.scrollTop = debug.scrollHeight;
    }

    function clearDebug() {
      debug.textContent = '';
    }

    // Show dashboard, hide auth forms
    function showDashboard(email) {
      log("Showing dashboard for: " + email);
      authSection.classList.add("hidden");
      dashboardSection.classList.remove("hidden");
      userEmail.textContent = email;
      msg.textContent = "";
    }

    // Show auth forms, hide dashboard
    function showAuth() {
      log("Showing auth forms");
      authSection.classList.remove("hidden");
      dashboardSection.classList.add("hidden");
    }

    // Manual redirect button (fallback)
    window.manualRedirect = function() {
      log("Manual redirect triggered by user");
      // Force session check before redirect
      supabase.auth.getSession().then(({ data }) => {
        if (data?.session) {
          log("Session confirmed, redirecting...");
          window.location.href = "upload.html?verified=true";
        } else {
          log("No session found, please login again");
          msg.textContent = "⚠️ Session not found. Please login again.";
          msg.className = "warning";
        }
      });
    };

    // Logout
    window.doLogout = async function() {
      log("Logout requested");
      await supabase.auth.signOut();
      log("Logged out successfully");
      showAuth();
      msg.textContent = "👋 Logged out";
      msg.className = "success";
    };

    // Check session on page load - with retry
    async function checkSessionWithRetry(maxRetries = 3) {
      clearDebug();
      log("=== SESSION CHECK START ===");
      log("Max retries: " + maxRetries);
      
      for (let i = 0; i < maxRetries; i++) {
        log(`Attempt ${i + 1}/${maxRetries}`);
        
        try {
          const { data, error } = await supabase.auth.getSession();
          
          if (error) {
            log("Session error: " + error.message);
            continue;
          }
          
          if (data?.session) {
            const email = data.session.user.email;
            log("✅ Session found: " + email);
            log("User ID: " + data.session.user.id);
            log("Redirecting to upload.html...");
            showDashboard(email);
            
            // Wait 500ms to ensure session is stable, then redirect
            setTimeout(() => {
              window.location.href = "upload.html?session_verified=true";
            }, 500);
            
            return true;
          } else {
            log("❌ No session found");
          }
        } catch (e) {
          log("Exception: " + e.message);
        }
        
        // Wait before retry
        if (i < maxRetries - 1) {
          log("Waiting 300ms before retry...");
          await new Promise(resolve => setTimeout(resolve, 300));
        }
      }
      
      log("=== SESSION CHECK FAILED ===");
      log("Showing auth forms");
      showAuth();
      return false;
    }

    // Sign In Handler
    document.getElementById("signinForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      msg.textContent = ""; msg.className = "";
      
      const btn = document.getElementById("signinBtn");
      const email = document.getElementById("signinEmail").value.trim();
      const password = document.getElementById("signinPassword").value;
      
      btn.disabled = true;
      btn.textContent = "Signing in...";
      log("Sign in attempt: " + email);
      
      try {
        const { data, error } = await supabase.auth.signInWithPassword({ email, password });
        
        if (error) throw error;
        
        log("✅ Sign in successful");
        log("User: " + data.user.email);
        log("Session expires: " + new Date(data.session.expires_at * 1000).toLocaleString());
        
        msg.textContent = "✅ Login successful!";
        msg.className = "success";
        
        // Wait 1 second to ensure session is fully established
        await new Promise(resolve => setTimeout(resolve, 1000));
        
        // Verify session exists
        const {  } = await supabase.auth.getSession();
        if (sessionData?.session) {
          log("Session verified, redirecting...");
          window.location.href = "upload.html?login_success=true";
        } else {
          log("Session not found after login, showing dashboard with manual button");
          showDashboard(email);
          msg.textContent = "⚠️ Login succeeded but session not persisted. Use the button below.";
          msg.className = "warning";
        }
        
      } catch (err) {
        log("❌ Sign in error: " + err.message);
        msg.textContent = "❌ " + err.message;
        msg.className = "error";
        btn.disabled = false;
        btn.textContent = "Sign in";
      }
    });

    // Sign Up Handler
    document.getElementById("signupForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      msg.textContent = ""; msg.className = "";
      
      const btn = document.getElementById("signupBtn");
      const email = document.getElementById("signupEmail").value.trim();
      const password = document.getElementById("signupPassword").value;
      
      btn.disabled = true;
      btn.textContent = "Creating account...";
      log("Sign up attempt: " + email);
      
      try {
        const { data, error } = await supabase.auth.signUp({ email, password });
        
        if (error) throw error;
        
        if (data?.session) {
          log("✅ Sign up successful + auto-login");
          log("User: " + data.user.email);
          
          msg.textContent = "✅ Account created!";
          msg.className = "success";
          
          // Wait for session stability
          await new Promise(resolve => setTimeout(resolve, 1000));
          
          // Verify and redirect
          const {  } = await supabase.auth.getSession();
          if (sessionData?.session) {
            log("Session verified, redirecting...");
            window.location.href = "upload.html?signup_success=true";
          } else {
            log("Session not found after signup");
            showDashboard(email);
            msg.textContent = "⚠️ Account created but session issue. Use button below.";
            msg.className = "warning";
          }
        } else {
          log("⚠️ Sign up successful but needs email confirmation");
          msg.textContent = "⚠️ Check your email to confirm";
          msg.className = "warning";
          btn.disabled = false;
          btn.textContent = "Create account";
        }
        
      } catch (err) {
        log("❌ Sign up error: " + err.message);
        msg.textContent = "❌ " + err.message;
        msg.className = "error";
        btn.disabled = false;
        btn.textContent = "Create account";
      }
    });

    // Listen for auth state changes
    supabase.auth.onAuthStateChange((event, session) => {
      log("🔄 Auth state changed: " + event);
      if (session?.user) {
        log("Session user: " + session.user.email);
      }
    });

    // Init on load
    log("=== PAGE LOADED ===");
    log("Supabase URL: " + SUPABASE_URL);
    checkSessionWithRetry();
  </script>
</body>
</html>
