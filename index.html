<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="google-site-verification" content="pnMO71pG0tx4Qb-05hMFPJd44bHPGA509iVMZzBE_NQ" />
  <title>🔐 MCALTONZ 2026</title>
  <style>
    :root { --bg:#040508; --accent:#00ced1; --glass:rgba(255,255,255,0.04); --border:rgba(0,206,209,0.15); --text:#e8f0ff; }
    * { box-sizing:border-box; margin:0; padding:0; }
    body { background:var(--bg); color:var(--text); font-family:system-ui,sans-serif; min-height:100vh; display:flex; align-items:center; justify-content:center; padding:1rem; }
    .card { background:var(--glass); border:1px solid var(--border); border-radius:18px; padding:2rem; width:100%; max-width:400px; }
    h1 { color:var(--accent); margin-bottom:1.5rem; text-align:center; }
    h2 { font-size:1.1rem; margin:1.5rem 0 0.8rem; }
    input { width:100%; padding:0.8rem; margin:0.3rem 0; background:rgba(0,0,0,0.3); border:1px solid var(--border); border-radius:8px; color:var(--text); font-size:1rem; }
    button { width:100%; padding:0.8rem; margin-top:0.8rem; background:var(--accent); color:#000; border:none; border-radius:8px; font-weight:600; cursor:pointer; font-size:1rem; }
    button:disabled { opacity:0.6; cursor:not-allowed; }
    #msg { margin-top:1rem; text-align:center; min-height:1.2rem; font-size:0.95rem; }
    .success{color:#00ff9d} .error{color:#ff6b9d} .warning{color:orange}
    .debug { margin-top:1rem; padding:0.5rem; background:rgba(0,0,0,0.3); border-radius:4px; font-size:0.75rem; font-family:monospace; color:#888; }
  </style>
</head>
<body>
  <div class="card">
    <h1>🔐 MCALTONZ 2026</h1>
    
    <div id="auth-forms">
      <h2>Sign in</h2>
      <form id="signinForm">
        <input id="signinEmail" type="email" placeholder="Email" required autocomplete="email" />
        <input id="signinPassword" type="password" placeholder="Password" required autocomplete="current-password" />
        <button type="submit" id="signinBtn">Sign in</button>
      </form>

      <h2>Sign up</h2>
      <form id="signupForm">
        <input id="signupEmail" type="email" placeholder="Email" required autocomplete="email" />
        <input id="signupPassword" type="password" placeholder="Password" required autocomplete="new-password" />
        <button type="submit" id="signupBtn">Create account</button>
      </form>
    </div>

    <div id="logged-in" style="display:none; text-align:center;">
      <p style="font-size:1.2rem; margin-bottom:1rem;">✅ Logged in as:</p>
      <p id="user-email" style="color:var(--accent); font-weight:600; margin-bottom:1rem;"></p>
      <button onclick="goToUpload()">📤 Go to Upload</button>
      <button onclick="doLogout()" style="background:transparent; border:1px solid #ff6b9d; color:#ff6b9d; margin-top:0.5rem;">🚪 Logout</button>
    </div>

    <p id="msg"></p>
    <div class="debug" id="debug"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = "https://zmtudgbebtnoiysebeli.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_U22LM59-HGzGBp0xk8Ouxg_CGngfga8";
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    
    const msg = document.getElementById("msg");
    const debug = document.getElementById("debug");
    const authForms = document.getElementById("auth-forms");
    const loggedIn = document.getElementById("logged-in");
    const userEmail = document.getElementById("user-email");

    function log(msg) {
      console.log('[Auth]', msg);
      debug.textContent = msg;
    }

    async function checkSession() {
      log("Checking session...");
      try {
        const { data, error } = await supabase.auth.getSession();
        if (error) {
          log("Session error: " + error.message);
          showAuth();
          return;
        }
        if (data?.session) {
          log("Session found: " + data.session.user.email);
          showDashboard(data.session.user.email);
        } else {
          log("No session");
          showAuth();
        }
      } catch (e) {
        log("Exception: " + e.message);
        showAuth();
      }
    }

    function showAuth() {
      authForms.style.display = "block";
      loggedIn.style.display = "none";
    }

    function showDashboard(email) {
      authForms.style.display = "none";
      loggedIn.style.display = "block";
      userEmail.textContent = email;
      msg.textContent = "";
    }

    function goToUpload() {
      log("Redirecting to upload.html");
      window.location.href = "upload.html";
    }

    async function doLogout() {
      log("Logging out...");
      await supabase.auth.signOut();
      log("Logged out");
      checkSession();
    }

    // Sign In Handler
    document.getElementById("signinForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      msg.textContent = ""; msg.className = "";
      
      const btn = document.getElementById("signinBtn");
      btn.disabled = true;
      btn.textContent = "Signing in...";
      
      try {
        const email = document.getElementById("signinEmail").value.trim();
        const password = document.getElementById("signinPassword").value;
        
        log("Signing in: " + email);
        const { data, error } = await supabase.auth.signInWithPassword({ email, password });
        
        if (error) throw error;
        
        log("Sign in success");
        msg.textContent = "✅ Login successful!";
        msg.className = "success";
        setTimeout(goToUpload, 800);
        
      } catch (err) {
        log("Sign in error: " + err.message);
        msg.textContent = "❌ " + err.message;
        msg.className = "error";
      } finally {
        btn.disabled = false;
        btn.textContent = "Sign in";
      }
    });

    // Sign Up Handler
    document.getElementById("signupForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      msg.textContent = ""; msg.className = "";
      
      const btn = document.getElementById("signupBtn");
      btn.disabled = true;
      btn.textContent = "Creating account...";
      
      try {
        const email = document.getElementById("signupEmail").value.trim();
        const password = document.getElementById("signupPassword").value;
        
        log("Signing up: " + email);
        const { data, error } = await supabase.auth.signUp({ email, password });
        
        if (error) throw error;
        
        if (data?.session) {
          log("Sign up success + auto login");
          msg.textContent = "✅ Account created! Redirecting...";
          msg.className = "success";
          setTimeout(goToUpload, 800);
        } else {
          log("Sign up success but needs email confirmation");
          msg.textContent = "⚠️ Check your email to confirm";
          msg.className = "warning";
        }
        
      } catch (err) {
        log("Sign up error: " + err.message);
        msg.textContent = "❌ " + err.message;
        msg.className = "error";
      } finally {
        btn.disabled = false;
        btn.textContent = "Create account";
      }
    });

    // Init
    log("Page loaded");
    checkSession();
  </script>
</body>
</html>
