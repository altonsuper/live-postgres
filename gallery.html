<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🖼️ Gallery - MCALTONZ 2026</title>
  <style>
    :root{--bg:#040508;--accent:#00ced1;--glass:rgba(255,255,255,0.04);--border:rgba(0,206,209,0.15);--text:#e8f0ff;--sec:#8a9ab0}
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:var(--bg);color:var(--text);font-family:system-ui,sans-serif;min-height:100vh;padding:2rem}
    .nav{display:flex;justify-content:space-between;margin-bottom:2rem;flex-wrap:wrap;gap:1rem}
    .nav a{padding:0.5rem 1rem;background:var(--glass);border:1px solid var(--border);border-radius:6px;color:var(--text);text-decoration:none}
    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:1rem}
    .card{background:var(--glass);border:1px solid var(--border);border-radius:12px;overflow:hidden}
    .thumb{height:180px;background:#0a0c14;display:flex;align-items:center;justify-content:center}
    .thumb img,.thumb video{width:100%;height:100%;object-fit:cover}
    .info{padding:0.8rem}
    .name{font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .meta{color:var(--sec);font-size:0.8rem;margin-top:0.3rem}
    .actions{display:flex;gap:0.5rem;margin-top:0.5rem}
    .actions a{flex:1;padding:0.4rem;background:rgba(0,206,209,0.1);border:1px solid var(--border);border-radius:4px;color:var(--text);text-decoration:none;text-align:center;font-size:0.8rem}
    .empty{grid-column:1/-1;text-align:center;padding:3rem;color:var(--sec)}
  </style>
</head>
<body>
  <div class="nav">
    <h2>🖼️ Gallery</h2>
    <a href="upload.html">📤 Upload More</a>
  </div>
  <div class="grid" id="grid"><div class="empty">🔄 Loading...</div></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = "https://zmtudgbebtnoiysebeli.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_U22LM59-HGzGBp0xk8Ouxg_CGngfga8";
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    const grid = document.getElementById('grid');

    async function loadGallery() {
      // Fetch ALL uploads (public read)
      const { data, error } = await supabase.from('uploads').select('*').order('uploaded_at', { ascending: false });
      
      if (error) { grid.innerHTML = `<div class="empty">❌ ${error.message}</div>`; return; }
      if (!data?.length) { grid.innerHTML = '<div class="empty">📭 No files yet. <a href="upload.html" style="color:var(--accent)">Upload now</a></div>'; return; }

      grid.innerHTML = data.map(f => {
        const isImg = f.file_type?.startsWith('image/');
        const isVid = f.file_type?.startsWith('video/');
        const thumb = isImg ? `<img src="${f.file_path}" loading="lazy">` : 
                      isVid ? `<video src="${f.file_path}" muted></video>` : 
                      `<div style="height:100%;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0.2)">📄 ${f.file_name.split('.').pop().toUpperCase()}</div>`;
        
        return `
          <div class="card">
            <div class="thumb">${thumb}</div>
            <div class="info">
              <div class="name" title="${f.file_name}">${f.file_name}</div>
              <div class="meta">${(f.file_size/1024).toFixed(1)} KB • ${new Date(f.uploaded_at).toLocaleDateString()}</div>
              <div class="actions">
                <a href="${f.file_path}" target="_blank" download="${f.file_name}">💾 Download</a>
              </div>
            </div>
          </div>`;
      }).join('');
    }

    loadGallery();
  </script>
</body>
</html>
