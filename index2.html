<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Postgres Test</title>
  <style>body{background:#0a0a0f;color:#00ff9d;font-family:monospace;padding:2rem}</style>
</head>
<body>
  <h1>🚀 Connected to PostgreSQL</h1>
  <div id="output">Loading...</div>
  <script>
    const URL = 'https://zmtudgbebtnoiysebeli.supabase.co/greetings'
    const KEY = 'sb_publishable_U22LM59-HGzGBp0xk8Ouxg_CGngfga8'

    fetch(URL, {
      headers: {
        'apikey': KEY,
        'Authorization': `Bearer ${KEY}`,
        'Content-Type': 'application/json'
      }
    })
    .then(res => res.json())
    .then(data => {
      document.getElementById('output').textContent = data[0]?.message || 'Table is empty'
      console.log('✅ Raw Postgres response:', data)
    })
    .catch(err => {
      document.getElementById('output').textContent = '❌ ' + err.message
      console.error('🔍 Fetch error:', err)
    })
  </script>
</body>
</html>
