<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Dashboard</title>
  <style>
    body { background:#0a0a0f; color:#00ff9d; font-family:monospace; padding:1rem; max-width:800px; margin:0 auto; }
    .card { background:#1a1a2e; padding:1rem; margin:0.5rem 0; border-left:3px solid #00ff9d; border-radius:4px; }
    .grid { display:grid; grid-template-columns:repeat(auto-fit, minmax(200px, 1fr)); gap:0.5rem; }
    .stat { font-size:1.8rem; font-weight:bold; color:#fff; margin:0.5rem 0; }
    .btn { padding:0.5rem 1rem; background:#1a1a2e; border:1px solid #00ff9d; color:#00ff9d; cursor:pointer; text-decoration:none; display:inline-block; }
    .btn:hover { background:#00ff9d; color:#0a0a0f; }
    .hidden { display:none; }
    small { color:#888; }
  </style>
</head>
